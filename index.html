<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>T4SKS - Login</title>
    <style>
        :root { --bg: #121212; --card: #1e1e1e; --accent: #1ed760; --text: #ffffff; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); display: flex; align-items: center; justify-content: center; height: 100vh; }
        .login-card { background: var(--card); padding: 40px; border-radius: 15px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); width: 320px; }
        h1 { color: var(--accent); margin-bottom: 10px; }
        p { color: #b3b3b3; margin-bottom: 30px; }
        #btn-google { background: white; color: black; border: none; padding: 12px 20px; border-radius: 25px; font-weight: bold; cursor: pointer; display: flex; align-items: center; gap: 10px; width: 100%; justify-content: center; transition: 0.3s; }
        #btn-google:hover { background: #e0e0e0; }
    </style>
</head>
<body>
    <div class="login-card">
        <h1>🚀 T4SKS</h1>
        <p>Organize suas tarefas de forma simples e colaborativa.</p>
        <button id="btn-google">
            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/action/google.svg" width="20" alt="">
            Entrar com Google
        </button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCOHWpGPcdUEXuPopdZd16qQTDHKd-R994",
            authDomain: "t4sks-af64e.firebaseapp.com",
            projectId: "t4sks-af64e",
            storageBucket: "t4sks-af64e.firebasestorage.app",
            messagingSenderId: "1069050787483",
            appId: "1:1069050787483:web:04ac9c6780764ec14ef83e"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();

        onAuthStateChanged(auth, (user) => { if (user) window.location.href = "dashboard.html"; });

        document.getElementById('btn-google').onclick = async () => {
            try { await signInWithPopup(auth, provider); } 
            catch (error) { alert("Erro ao entrar: " + error.message); }
        };
    </script>
</body>
</html>
